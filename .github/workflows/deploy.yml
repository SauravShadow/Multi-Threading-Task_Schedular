name: Deploy Task Scheduler

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted      # Runs on YOUR Windows machine

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Rebuild and restart Task Scheduler container
        shell: powershell
        run: |
          Set-Location C:\Users\HP\Desktop\HostedProjects\MultiThreadingTaskSchedular

          # Sync working directory with latest commit
          git fetch --all
          git reset --hard origin/main

          # Rebuild the Docker image (compiles C++ inside Docker) and restart container
          docker compose up -d --build taskscheduler

          # Clean up old dangling image layers to save disk space
          docker image prune -f

      - name: Verify container is running
        shell: powershell
        run: |
          $status = docker inspect --format="{{.State.Status}}" taskscheduler
          if ($status -ne "running") {
            Write-Error "TaskScheduler container is NOT running. Status: $status"
            exit 1
          }
          Write-Host "TaskScheduler container is running successfully."
